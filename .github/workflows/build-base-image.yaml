name: build-akaunting-base-image

on:
  push:
    branches: ["master"]
    paths:
      - "docker/base/**"
      - ".github/workflows/build-base-image.yaml"
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  BASE_IMAGE_REPO: ghcr.io/grit-usa/akaunting-base

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: ./docker/base
          file: ./docker/base/Dockerfile
          push: true
          tags: |
            ${{ env.BASE_IMAGE_REPO }}:${{ github.sha }}
            ${{ env.BASE_IMAGE_REPO }}:deploy-latest

      - name: Trigger app image rebuild
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: "akaunting-base-updated",
              client_payload: {
                source_workflow: "build-akaunting-base-image",
                source_sha: context.sha
              }
            });
